{% extends 'base.html' %}

{% block title %}Confirm Deletion - SocialHub{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade-in">
    <div class="col-md-5">
        <div class="glass-card p-5 text-center">
            <div class="text-danger mb-4">
                <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold mb-3">Delete Profile?</h2>
            <p class="text-muted mb-5">
                Are you sure you want to delete the profile for <strong>{{ profile.username }}</strong>? 
                This action cannot be undone.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-danger btn-lg py-3 fw-bold">
                        Yes, Delete Permanently
                    </button>
                    <a href="{% url 'view_profile' profile.pk %}" class="btn btn-link text-decoration-none text-muted">
                        Cancel and Go Back
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
